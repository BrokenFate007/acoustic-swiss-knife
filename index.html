<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acoustic Lab Master</title>
    <link rel="stylesheet" href="css/laboratory.css">
</head>
<body>
    <header>
        <h1>Acoustic Lab Master</h1>
        <div class="controls-group">
            <div class="control-block">
                <label for="master-samplerate">Sample Rate</label>
                <select id="master-samplerate">
                    <option value="auto">Auto (Device Default)</option>
                    <option value="44100">44.1 kHz</option>
                    <option value="48000">48.0 kHz</option>
                    <option value="88200">88.2 kHz</option>
                    <option value="96000">96.0 kHz</option>
                    <option value="192000">192.0 kHz</option>
                </select>
            </div>
            <div class="control-block">
                <label for="master-fftsize">FFT Size</label>
                <select id="master-fftsize">
                    <option value="1024">1024</option>
                    <option value="2048">2048</option>
                    <option value="4096">4096</option>
                    <option value="8192" selected>8192</option>
                    <option value="16384">16384</option>
                    <option value="32768">32768</option>
                </select>
            </div>
            <button id="btn-power">Power ON</button>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Signal Stacking</h2>
                <button id="btn-add-tone">+ Add Tone</button>
            </div>
            <div id="signal-stack" class="signal-table">
                <!-- Tone rows will be injected here by app.js -->
                <div class="empty-state" style="color: var(--text-secondary); text-align: center; font-family: var(--font-mono); padding: 2rem;">
                    AUDIO SYSTEM OFFLINE. POWER ON TO BEGIN.
                </div>
            </div>
        </section>
        
        <section class="panel" id="analyzer-panel">
            <div class="analyzer-header">
                <div class="view-tabs">
                    <button class="view-tab active" data-view="spectrum">Spectrum</button>
                    <button class="view-tab" data-view="spectrogram">Spectrogram</button>
                    <button class="view-tab" data-view="octave">Octave</button>
                </div>
                <div class="analyzer-toolbar">
                    <button class="toolbar-btn" id="btn-peak-hold" title="Peak Hold">▲ Peak Hold</button>
                    <button class="toolbar-btn" id="btn-save-ref" title="Save Reference">◆ Save Ref</button>
                    <button class="toolbar-btn" id="btn-freeze" title="Freeze Display">⏸ Freeze</button>
                    <button class="toolbar-btn" id="btn-export" title="Export PNG">↓ Export</button>
                </div>
            </div>
            <div class="canvas-container" id="canvas-container">
                <canvas id="spectrum-canvas"></canvas>
            </div>
            <div class="analyzer-bottom">
                <div class="sub-panel settings-panel">
                    <h3 class="sub-panel-title">View & Settings</h3>
                    <div class="settings-grid">
                        <label for="setting-weighting">Weighting</label>
                        <select id="setting-weighting">
                            <option value="Z" selected>Z (Flat / dBFS)</option>
                            <option value="A">A-Weighting</option>
                            <option value="C">C-Weighting</option>
                        </select>

                        <label for="setting-smoothing">Smoothing</label>
                        <div class="smoothing-row">
                            <input type="range" id="setting-smoothing" min="0" max="1" step="0.05" value="0.8">
                            <span id="smoothing-val" class="setting-readout">0.80</span>
                        </div>

                        <label for="setting-bands">Bands</label>
                        <select id="setting-bands">
                            <option value="third" selected>1/3 Octave (31 bands)</option>
                            <option value="full">1/1 Octave (10 bands)</option>
                        </select>

                        <label for="setting-decay">Decay</label>
                        <select id="setting-decay">
                            <option value="fast">Fast</option>
                            <option value="medium" selected>Medium</option>
                            <option value="slow">Slow</option>
                            <option value="infinite">Infinite</option>
                        </select>

                        <label for="db-min">dB Range</label>
                        <div class="db-range-inputs">
                            <input type="number" id="db-min" value="-120" min="-150" max="-10" step="5">
                            <span class="db-range-separator">→</span>
                            <input type="number" id="db-max" value="0" min="-50" max="0" step="5">
                            <span class="db-unit">dB</span>
                        </div>
                    </div>
                </div>
                <div class="sub-panel stats-panel" id="stats-strip">
                    <h3 class="sub-panel-title">Signal Stats</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">PEAK</span>
                            <div class="stat-value-row">
                                <span class="stat-value stat-lpeak">---</span>
                                <span class="stat-unit">dB</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">RMS</span>
                            <div class="stat-value-row">
                                <span class="stat-value stat-leq">---</span>
                                <span class="stat-unit">dB</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">CREST</span>
                            <div class="stat-value-row">
                                <span class="stat-value stat-crest">---</span>
                                <span class="stat-unit">dB</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">CLIPPING</span>
                            <div class="stat-value-row">
                                <span class="stat-indicator stat-clipping" id="clipping-dot"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
